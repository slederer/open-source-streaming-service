name: tests

on:
  push:
    branches: [main]
    paths:
      - 'AI-security-service/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'AI-security-service/**'

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: AI-security-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Production deps that the scanner imports at startup. Match the
          # versions running on EC2 within reason.
          pip install \
            fastapi \
            'uvicorn[standard]' \
            httpx \
            'starlette<0.42' \
            authlib \
            itsdangerous \
            python-multipart \
            'stripe>=8' \
            'passlib[bcrypt]' \
            'bcrypt==4.0.1' \
            requests \
            pyyaml \
            cryptography \
            pytest \
            pytest-asyncio

      - name: Syntax check
        run: |
          python -c "import ast; \
            [ast.parse(open(p).read()) for p in [ \
              'scanner/app.py','scanner/advanced.py','scanner/admin.py', \
              'scanner/ai_triage.py','scanner/notifications.py', \
              'scanner/security.py','scanner/blog_posts.py']]"

      - name: Test collection (catches missing imports / package paths)
        run: python -m pytest scanner/tests/ --co -q

      - name: Run critical-path tests
        run: |
          python -m pytest \
            scanner/tests/test_admin.py \
            scanner/tests/test_db.py \
            scanner/tests/test_billing.py \
            scanner/tests/test_security.py \
            scanner/tests/test_audit_fixes.py \
            scanner/tests/test_ai_triage.py \
            -q --tb=short

      - name: Run full suite (must pass)
        # Green baseline restored — any test failure now blocks the build.
        # If a network-dependent test starts failing, mark it skip rather
        # than reintroducing continue-on-error.
        run: python -m pytest scanner/tests/ -q --tb=line
